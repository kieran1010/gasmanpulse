        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasmanPulse | 2026 High-Impact Digest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12 font-sans">

    <nav class="bg-blue-900 text-white p-4 mb-8 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter italic">GASMAN<span class="text-blue-400">PULSE</span></h1>
            <div class="flex gap-6">
                <button onclick="switchTab('digest')" class="text-xs uppercase font-bold tracking-widest hover:text-blue-300 transition">Digest</button>
                <button onclick="switchTab('quiz')" class="text-xs uppercase font-bold tracking-widest hover:text-blue-300 transition">Quiz</button>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4">
        
        <section id="tab-digest">
            <div class="mb-8">
                <button onclick="runPulse()" id="main-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-blue-700 shadow-xl transition-all active:scale-[0.98]">
                    Fetch Practice-Changing Research
                </button>
                <p class="text-center text-[10px] text-slate-400 mt-3 uppercase tracking-widest italic font-medium">Scanning Top 30 Anaesthesia & Pain Journals</p>
            </div>

            <div id="results-area" class="space-y-6">
                </div>
        </section>

        <section id="tab-quiz" class="hidden">
            <div id="quiz-content" class="text-center">
                <p class="text-slate-400 italic py-20 border-2 border-dashed border-slate-200 rounded-3xl">Generate a digest first to build your daily quiz.</p>
            </div>
        </section>
    </main>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "AIzaSyDgYwY6lUJLHM17EfYCxoIWLgzzo_S_3-Q"; 
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent";

        const journals = [
            "British Journal of Anaesthesia", "Anesthesiology", "Anaesthesia", "European Journal of Anaesthesiology", 
            "Pain", "Journal of Clinical Anesthesia", "Anaesthesia Critical Care & Pain Medicine", "Anesthesia and Analgesia", 
            "Regional Anesthesia and Pain Medicine", "European Journal of Pain", "Canadian Journal of Anesthesia", 
            "Clinical Journal of Pain", "Pain Medicine", "Minerva Anestesiologica", "Best Practice & Research Clinical Anaesthesiology", 
            "Pain Practice", "Journal of Anesthesia", "BMC Anesthesiology", "Pain Physician", "Journal of Neurosurgical Anesthesiology", 
            "International Journal of Obstetric Anesthesia", "Journal of Clinical Monitoring and Computing", "Perioperative Medicine", 
            "Journal of Cardiothoracic and Vascular Anesthesia", "Current Opinion in Anesthesiology", "Acta Anaesthesiologica Scandinavica", 
            "Brazilian Journal of Anesthesiology", "Pediatric Anesthesiology", "Anaesthesia and Intensive Care"
        ];

        let fetchedAbstracts = "";

        function switchTab(tab) {
            document.getElementById('tab-digest').classList.toggle('hidden', tab !== 'digest');
            document.getElementById('tab-quiz').classList.toggle('hidden', tab !== 'quiz');
        }

        async function callAI(prompt) {
            const response = await fetch(PROXY + GEMINI_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json", "x-goog-api-key": API_KEY },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        async function runPulse() {
            const resultsArea = document.getElementById('results-area');
            const btn = document.getElementById('main-btn');
            btn.disabled = true;
            btn.innerText = "SHUFFLING LATEST TRIALS...";
            resultsArea.innerHTML = `<div class="flex justify-center p-20"><div class="loader h-10 w-10 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div></div>`;

            try {
                const journalQuery = journals.map(j => `"${j}"[Journal]`).join(" OR ");
                
                // Simplified query using reldate=90 for the last 3 months
                const finalQuery = `(${journalQuery}) AND (clinicaltrial[Filter] OR randomizedcontrolledtrial[Filter])`;

                // Search a massive pool of 1000 papers from the last 90 days
                const searchRes = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(finalQuery)}&retmax=1000&reldate=90&datetype=pdat&retmode=json`);
                const searchData = await searchRes.json();
                let ids = searchData.esearchresult.idlist;

                if (!ids || ids.length === 0) throw new Error("No recent trials found in the last 90 days.");

                // Pick 5 random papers from that pool of 1000
                const shuffledIds = ids.sort(() => 0.5 - Math.random()).slice(0, 5);

                btn.innerText = "ANALYZING RANDOM SAMPLE...";
                const fetchRes = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${shuffledIds.join(",")}&rettype=abstract&retmode=text`);
                fetchedAbstracts = await fetchRes.text();

                // Prompt for JSON formatted Digest
                const prompt = `Return a JSON array of objects for these abstracts. Format: [{"title": "", "journal": "", "finding": "", "takeaway": "", "pmid": ""}] 
                Abstracts: ${fetchedAbstracts}`;
                
                const aiRes = await callAI(prompt);
                const papers = JSON.parse(aiRes.replace(/```json|```/g, ""));
                
                renderDigest(papers);
                
                // Update Quiz Button for 10 questions
                document.getElementById('quiz-content').innerHTML = `
                    <button onclick="generateQuiz()" class="bg-emerald-600 text-white px-10 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-emerald-700 shadow-lg transition">
                        Start 10-Question Knowledge Check
                    </button>`;

            } catch (err) {
                resultsArea.innerHTML = `<div class="bg-red-50 p-6 rounded-xl text-red-800 border border-red-200 text-sm text-center">
                    <strong>Fetch Error:</strong> ${err.message}
                </div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Fetch Practice-Changing Research";
            }
        }

        function renderDigest(papers) {
            const container = document.getElementById('results-area');
            container.innerHTML = papers.map(p => `
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm transition-all">
                    <h3 class="text-lg font-black text-slate-900 leading-tight mb-1">${p.title}</h3>
                    <p class="text-xs italic text-blue-600 font-medium mb-6 uppercase tracking-wider">${p.journal}</p>
                    
                    <div class="space-y-4 mb-6">
                        <div>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Finding</span>
                            <p class="text-sm text-slate-700 mt-1">${p.finding}</p>
                        </div>
                        <div>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Clinical Takeaway</span>
                            <p class="text-sm text-slate-900 font-semibold mt-1 italic">"${p.takeaway}"</p>
                        </div>
                    </div>

                    <a href="https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/" target="_blank" class="text-[10px] font-bold text-slate-400 hover:text-blue-600 transition flex items-center gap-1 uppercase tracking-widest">
                        View on PubMed ↗
                    </a>
                </div>
            `).join('');
        }

        async function generateQuiz() {
            const quizContent = document.getElementById('quiz-content');
            quizContent.innerHTML = `<div class="loader h-8 w-8 border-4 border-slate-200 border-t-emerald-600 rounded-full mx-auto"></div><p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Generating 10 High-Yield Cards...</p>`;
            
            try {
                // Updated prompt to include PMID in the JSON for the quiz
                const prompt = `Based on these abstracts, generate 10 clinical MCQs. 
                Focus on methodology and primary outcomes.
                Return ONLY a JSON array: [{"question": "", "options": ["A", "B", "C"], "correct": "Letter", "explanation": "", "pmid": ""}]
                Abstracts: ${fetchedAbstracts}`;
                
                const res = await callAI(prompt);
                const quizData = JSON.parse(res.replace(/```json|```/g, ""));
                
                quizContent.innerHTML = `<div class="max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar text-left">` + 
                    quizData.map((q, i) => `
                        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm mb-6 overflow-hidden animate-fade-in">
                            <div class="p-6 bg-slate-50 border-b border-slate-100">
                                <span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest font-mono">Card ${String(i+1).padStart(2, '0')}</span>
                                <p class="text-slate-900 font-bold mt-2 leading-snug">${q.question}</p>
                            </div>
                            <div class="p-6">
                                <div class="space-y-2 mb-6 text-sm text-slate-600">
                                    ${q.options.map(opt => `<div class="p-3 border border-slate-100 rounded-xl bg-slate-50/50">${opt}</div>`).join('')}
                                </div>
                                
                                <div class="flex flex-col gap-3">
                                    <button onclick="document.getElementById('ans-${i}').classList.toggle('hidden')" 
                                            class="w-full text-[10px] font-black uppercase tracking-widest text-emerald-700 py-3 bg-emerald-50 rounded-xl hover:bg-emerald-100 transition">
                                        Reveal Rationale
                                    </button>
                                    
                                    <a href="https://pubmed.ncbi.nlm.nih.gov/${q.pmid}/" target="_blank" 
                                    class="text-center text-[9px] font-bold text-slate-300 hover:text-blue-500 uppercase tracking-widest transition">
                                        Verify Source on PubMed ↗
                                    </a>
                                </div>

                                <div id="ans-${i}" class="hidden mt-4 p-5 bg-emerald-600 rounded-2xl text-white animate-fade-in text-sm font-medium">
                                    <p class="font-black mb-2 uppercase tracking-widest text-[10px] text-emerald-200">Result: Correct Answer ${q.correct}</p>
                                    <p class="leading-relaxed opacity-95">${q.explanation}</p>
                                </div>
                            </div>
                        </div>
                    `).join('') + `</div>` +
                    `<button onclick="switchTab('digest')" class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mt-8 hover:text-blue-600 transition">← Back to Digest</button>`;
                    
            } catch (err) { 
                quizContent.innerHTML = `<div class="p-10 text-red-500 text-sm">Quiz Generation Failed: ${err.message}</div>`; 
            }
        }
    </script>
</body>
</html>
