<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasmanPulse | High-Impact Anaesthesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900">

    <nav class="bg-blue-900 text-white p-5 mb-8 shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter italic">GASMAN<span class="text-blue-400">PULSE</span></h1>
            <div class="flex gap-8">
                <button onclick="switchTab('digest')" class="text-[10px] uppercase font-bold tracking-[0.2em] hover:text-blue-300 transition">Digest</button>
                <button onclick="switchTab('quiz')" class="text-[10px] uppercase font-bold tracking-[0.2em] hover:text-blue-300 transition">Quiz</button>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4">
        
        <section id="tab-digest">
            <div class="mb-10 text-center">
                <button onclick="runPulse()" id="main-btn" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-sm uppercase tracking-[0.2em] hover:bg-blue-700 shadow-2xl transition-all active:scale-[0.97]">
                    Fetch Fresh Trials
                </button>
                <p class="text-[9px] text-slate-400 mt-4 uppercase tracking-[0.3em] font-bold">Randomized Sampling • Top 30 Journals • Last 90 Days</p>
            </div>

            <div id="results-area" class="space-y-8 text-left">
                </div>
        </section>

        <section id="tab-quiz" class="hidden">
            <div id="quiz-content" class="text-center">
                <div class="py-24 border-4 border-dashed border-slate-200 rounded-[3rem] bg-white/50">
                    <p class="text-slate-400 font-medium italic">Generate a digest first to unlock today's quiz.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Curated high-impact list
        const journals = ["British Journal of Anaesthesia", "Anesthesiology", "Anaesthesia", "European Journal of Anaesthesiology", "Pain", "Journal of Clinical Anesthesia", "Anaesthesia Critical Care & Pain Medicine", "Anesthesia and Analgesia", "Regional Anesthesia and Pain Medicine", "European Journal of Pain", "Canadian Journal of Anesthesia", "Clinical Journal of Pain", "Pain Medicine", "Minerva Anestesiologica", "Best Practice & Research Clinical Anaesthesiology", "Pain Practice", "Journal of Anesthesia", "BMC Anesthesiology", "Pain Physician", "Journal of Neurosurgical Anesthesiology", "International Journal of Obstetric Anesthesia", "Journal of Clinical Monitoring and Computing", "Perioperative Medicine", "Journal of Cardiothoracic and Vascular Anesthesia", "Current Opinion in Anesthesiology", "Acta Anaesthesiologica Scandinavica", "Brazilian Journal of Anesthesiology", "Pediatric Anesthesiology", "Anaesthesia and Intensive Care"];

        let currentPapers = []; 
        let idPool = [];        

        function switchTab(tab) {
            document.getElementById('tab-digest').classList.toggle('hidden', tab !== 'digest');
            document.getElementById('tab-quiz').classList.toggle('hidden', tab !== 'quiz');
            window.scrollTo(0, 0);
        }

        async function runPulse() {
            const resultsArea = document.getElementById('results-area');
            const btn = document.getElementById('main-btn');
            btn.disabled = true;
            btn.innerText = "SHUFFLING RECENT TRIALS...";
            resultsArea.innerHTML = `<div class="flex justify-center p-20"><div class="loader h-12 w-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div></div>`;

            try {
                const response = await fetch('/api/pulse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ journals, mode: 'digest' })
                });
                const result = await response.json();
                if (result.error) throw new Error(result.error);

                currentPapers = result.data; 
                idPool = result.allIds;      
                
                renderDigest();
                updateQuizPlaceholder();
            } catch (err) {
                resultsArea.innerHTML = `<div class="bg-red-50 p-8 rounded-3xl text-red-800 border border-red-100 text-center"><p class="font-bold">Fetch Failed</p><p class="text-xs mt-2 opacity-70">${err.message}</p></div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Fetch Fresh Trials";
            }
        }

        function renderDigest() {
            const container = document.getElementById('results-area');
            container.innerHTML = currentPapers.map((p, index) => `
                <div id="paper-${index}" class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm relative animate-fade-in hover:shadow-md transition-shadow">
                    <button onclick="rejectPaper(${index})" class="absolute top-8 right-8 text-slate-200 hover:text-red-500 transition-colors" title="Reject & Swap">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <h3 class="text-xl font-black text-slate-900 leading-tight mb-2 pr-12">${p.title}</h3>
                    <p class="text-[10px] italic text-blue-600 font-bold mb-8 uppercase tracking-widest">${p.journal}</p>
                    
                    <div class="space-y-6 mb-8 text-sm leading-relaxed">
                        <div>
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">Finding</span>
                            <p class="text-slate-700 mt-2">${p.finding}</p>
                        </div>
                        <div>
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">Clinical Takeaway</span>
                            <p class="text-slate-900 font-bold mt-2 italic border-l-4 border-blue-100 pl-4">"${p.takeaway}"</p>
                        </div>
                    </div>
                    <a href="https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/" target="_blank" class="inline-block text-[10px] font-black text-slate-400 hover:text-blue-600 transition uppercase tracking-widest">View Full Abstract ↗</a>
                </div>`).join('');
        }

        async function rejectPaper(index) {
            const card = document.getElementById(`paper-${index}`);
            card.innerHTML = `<div class="flex flex-col items-center py-16"><div class="loader h-6 w-6 border-2 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div><p class="text-[9px] mt-4 uppercase font-bold text-slate-300 tracking-widest">Swapping Card...</p></div>`;

            try {
                const displayedPmids = currentPapers.map(p => p.pmid);
                const availableIds = idPool.filter(id => !displayedPmids.includes(id));
                const newId = availableIds[Math.floor(Math.random() * availableIds.length)];

                const response = await fetch('/api/pulse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ specificId: newId, mode: 'digest' }) 
                });
                const result = await response.json();
                
                currentPapers[index] = result.data[0];
                renderDigest();
                updateQuizPlaceholder();
            } catch (err) { 
                card.innerHTML = `<p class="text-[10px] text-red-500 italic p-10 text-center">Swap failed: ${err.message}</p>`; 
            }
        }

        function updateQuizPlaceholder() {
            document.getElementById('quiz-content').innerHTML = `
                <div class="py-12">
                    <button onclick="generateQuiz()" class="bg-emerald-600 text-white px-12 py-5 rounded-[2rem] font-black text-sm uppercase tracking-[0.2em] hover:bg-emerald-700 shadow-xl transition-all active:scale-95">
                        Start 10-Question Knowledge Check
                    </button>
                    <p class="text-[9px] text-slate-400 mt-6 uppercase tracking-widest font-bold italic">Generated from current selection of papers</p>
                </div>`;
        }

        async function generateQuiz() {
            const quizContent = document.getElementById('quiz-content');
            quizContent.innerHTML = `<div class="py-20 flex flex-col items-center"><div class="loader h-10 w-10 border-4 border-slate-200 border-t-emerald-600 rounded-full animate-spin"></div><p class="mt-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Analyzing selection for high-yield questions...</p></div>`;
            
            try {
                const visibleIds = currentPapers.map(p => p.pmid);
                const response = await fetch('/api/pulse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ specificId: visibleIds.join(","), mode: 'quiz' })
                });
                const result = await response.json();
                
                quizContent.innerHTML = `<div class="max-h-[75vh] overflow-y-auto pr-4 custom-scrollbar text-left">` + result.data.map((q, i) => `
                    <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm mb-6 overflow-hidden animate-fade-in">
                        <div class="p-8 bg-slate-50 border-b border-slate-100">
                            <span class="text-[9px] font-black text-emerald-600 uppercase tracking-widest font-mono">Flashcard ${String(i+1).padStart(2, '0')}</span>
                            <p class="text-slate-900 font-bold mt-3 leading-snug text-lg">${q.question}</p>
                        </div>
                        <div class="p-8">
                            <div class="space-y-3 mb-8 text-sm text-slate-600">
                                ${q.options.map(opt => `<div class="p-4 border border-slate-100 rounded-2xl bg-slate-50/50 font-medium">${opt}</div>`).join('')}
                            </div>
                            <div class="flex flex-col gap-4 text-center">
                                <button onclick="document.getElementById('ans-${i}').classList.toggle('hidden')" class="w-full text-[10px] font-black uppercase tracking-widest text-emerald-700 py-4 bg-emerald-50 rounded-2xl hover:bg-emerald-100 transition">Reveal Rationale</button>
                                <a href="https://pubmed.ncbi.nlm.nih.gov/${q.pmid}/" target="_blank" class="text-[9px] font-bold text-slate-300 hover:text-blue-500 uppercase tracking-[0.2em] transition">Verify Source ↗</a>
                            </div>
                            <div id="ans-${i}" class="hidden mt-6 p-6 bg-emerald-600 rounded-[1.5rem] text-white animate-fade-in text-sm leading-relaxed shadow-inner">
                                <p class="font-black mb-3 uppercase tracking-widest text-[10px] text-emerald-100">Answer: ${q.correct}</p>
                                <p class="opacity-95 font-medium">${q.explanation}</p>
                            </div>
                        </div>
                    </div>`).join('') + `</div><button onclick="switchTab('digest')" class="text-[10px] font-black uppercase text-slate-400 tracking-[0.3em] mt-10 hover:text-blue-600 transition block mx-auto">← Back to Literature</button>`;
            } catch (err) { quizContent.innerHTML = `<div class="bg-red-50 p-10 rounded-3xl text-red-800 text-sm">Failed to generate quiz: ${err.message}</div>`; }
        }
    </script>
</body>
</html>
